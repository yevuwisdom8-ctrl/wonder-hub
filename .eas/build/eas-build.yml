build:
  name: Wonder Hub Android Preview
  steps:
    - eas/checkout
    - run:
        name: Install pnpm 10
        command: npm install -g pnpm@10.26.1
    - run:
        name: Install dependencies
        command: pnpm install --no-frozen-lockfile
    - run:
        name: Prebuild
        working_directory: artifacts/wonder-hub
        command: node_modules/.bin/expo prebuild --no-install --platform android
    - eas/run_gradle:
        inputs:
          app_directory: artifacts/wonder-hub
          gradle_tasks: assembleDebug
    - eas/upload_artifact:
        inputs:
          type: android-apk
          path: artifacts/wonder-hub/android/app/build/outputs/apk/debug/app-debug.apk
