build:
  name: Wonder Hub Android Preview
  steps:
    - eas/checkout
    - run:
        name: Install pnpm 10
        command: npm install -g pnpm@10.26.1
    - run:
        name: Install dependencies
        command: pnpm install --no-frozen-lockfile
    - run:
        name: Prebuild
        working_directory: artifacts/wonder-hub
        command: npx expo prebuild --no-install --platform android
    - run:
        name: Build APK
        working_directory: artifacts/wonder-hub/android
        command: |
          chmod +x gradlew
          export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
          ./gradlew assembleDebug --no-daemon
    - eas/upload_artifact:
        inputs:
          type: android-apk
          path: artifacts/wonder-hub/android/app/build/outputs/apk/debug/app-debug.apk
