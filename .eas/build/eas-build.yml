build:
  name: Wonder Hub Android Preview
  steps:
    - eas/checkout
    - run:
        name: Install pnpm 10
        command: npm install -g pnpm@10.26.1
    - run:
        name: Install dependencies
        command: pnpm install --no-frozen-lockfile
    - run:
        name: Prebuild
        working_directory: artifacts/wonder-hub
        command: npx expo prebuild --no-install --platform android
    - run:
        name: Fix Gradle wrapper
        working_directory: artifacts/wonder-hub/android
        command: |
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.10.2-bin.zip|' gradle/wrapper/gradle-wrapper.properties
          cat gradle/wrapper/gradle-wrapper.properties
    - run:
        name: Build APK
        working_directory: artifacts/wonder-hub/android
        command: |
          chmod +x gradlew
          export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
          ./gradlew assembleDebug --no-daemon --warning-mode=none --stacktrace 2>&1 | tail -200
    - eas/upload_artifact:
        inputs:
          type: android-apk
          path: artifacts/wonder-hub/android/app/build/outputs/apk/debug/app-debug.apk
