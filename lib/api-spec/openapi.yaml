openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Betting Tips API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tips
    description: Betting tip predictions
  - name: stats
    description: Statistics and summaries
  - name: subscribers
    description: Email subscriber management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tips:
    get:
      operationId: listTips
      tags: [tips]
      summary: List all tips
      parameters:
        - name: date
          in: query
          schema:
            type: string
          description: Filter by match date (YYYY-MM-DD)
        - name: sport
          in: query
          schema:
            type: string
          description: Filter by sport
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, won, lost, void]
          description: Filter by status
      responses:
        "200":
          description: List of tips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tip"
    post:
      operationId: createTip
      tags: [tips]
      summary: Create a new tip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TipInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tip"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tips/today:
    get:
      operationId: getTodaysTips
      tags: [tips]
      summary: Get today's tips
      responses:
        "200":
          description: Today's tips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tip"

  /tips/recent-results:
    get:
      operationId: getRecentResults
      tags: [tips]
      summary: Get recent resolved tips (won/lost)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
          description: Max number of results to return
      responses:
        "200":
          description: Recent results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tip"

  /tips/{id}:
    get:
      operationId: getTip
      tags: [tips]
      summary: Get a tip by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tip detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tip"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateTip
      tags: [tips]
      summary: Update a tip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TipUpdate"
      responses:
        "200":
          description: Updated tip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tip"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTip
      tags: [tips]
      summary: Delete a tip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get overall performance statistics
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

  /subscribers:
    get:
      operationId: listSubscribers
      tags: [subscribers]
      summary: List all subscribers (admin)
      responses:
        "200":
          description: List of subscribers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subscriber"
    post:
      operationId: subscribe
      tags: [subscribers]
      summary: Subscribe to daily tips email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscribeInput"
      responses:
        "201":
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscriber"
        "400":
          description: Invalid or duplicate email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscribers/{id}:
    delete:
      operationId: deleteSubscriber
      tags: [subscribers]
      summary: Remove a subscriber (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /emails/send-daily:
    post:
      operationId: sendDailyEmail
      tags: [subscribers]
      summary: Send today's tips to all active subscribers (admin)
      responses:
        "200":
          description: Email send result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendEmailResult"
        "500":
          description: Send failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Tip:
      type: object
      required:
        - id
        - sport
        - homeTeam
        - awayTeam
        - league
        - tipText
        - odds
        - status
        - matchDate
        - createdAt
      properties:
        id:
          type: integer
        sport:
          type: string
        homeTeam:
          type: string
        awayTeam:
          type: string
        league:
          type: string
        tipText:
          type: string
        odds:
          type: number
        confidence:
          type: ["integer", "null"]
          description: Confidence level 1-5
        status:
          type: string
          enum: [pending, won, lost, void]
        matchDate:
          type: string
          description: Match date (YYYY-MM-DD)
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: ["string", "null"]

    TipInput:
      type: object
      required:
        - sport
        - homeTeam
        - awayTeam
        - league
        - tipText
        - odds
        - matchDate
      properties:
        sport:
          type: string
        homeTeam:
          type: string
        awayTeam:
          type: string
        league:
          type: string
        tipText:
          type: string
        odds:
          type: number
        confidence:
          type: integer
          minimum: 1
          maximum: 5
        matchDate:
          type: string
        notes:
          type: string

    TipUpdate:
      type: object
      properties:
        sport:
          type: string
        homeTeam:
          type: string
        awayTeam:
          type: string
        league:
          type: string
        tipText:
          type: string
        odds:
          type: number
        confidence:
          type: integer
          minimum: 1
          maximum: 5
        status:
          type: string
          enum: [pending, won, lost, void]
        matchDate:
          type: string
        notes:
          type: string

    Stats:
      type: object
      required:
        - total
        - won
        - lost
        - pending
        - void
        - winRate
        - totalOddsWon
      properties:
        total:
          type: integer
        won:
          type: integer
        lost:
          type: integer
        pending:
          type: integer
        void:
          type: integer
        winRate:
          type: number
          description: Win rate as a percentage (0-100)
        totalOddsWon:
          type: number
          description: Sum of odds for won tips

    Subscriber:
      type: object
      required:
        - id
        - email
        - active
        - subscribedAt
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: ["string", "null"]
        active:
          type: boolean
        subscribedAt:
          type: string

    SubscribeInput:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
        name:
          type: string

    SendEmailResult:
      type: object
      required:
        - sent
        - failed
        - total
      properties:
        sent:
          type: integer
        failed:
          type: integer
        total:
          type: integer
        message:
          type: string

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
